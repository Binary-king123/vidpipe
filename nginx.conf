# Module 11 — Nginx Config for ilovedesi.fun
# Deploy to: /etc/nginx/sites-available/ilovedesi.fun
# Enable:    ln -s /etc/nginx/sites-available/ilovedesi.fun /etc/nginx/sites-enabled/
# Test:      nginx -t
# Reload:    systemctl reload nginx

server {
    listen 80;
    server_name ilovedesi.fun www.ilovedesi.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ilovedesi.fun;

    # SSL — managed by Certbot (auto-filled by: certbot --nginx -d ilovedesi.fun)
    # ssl_certificate     /etc/letsencrypt/live/ilovedesi.fun/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ilovedesi.fun/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy no-referrer-when-downgrade;

    # Next.js app (PM2 serves on port 3000)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Video files — served DIRECTLY from disk (fast, bypass Node.js)
    # Nginx handles Accept-Ranges automatically for video seeking
    location /videos/ {
        alias /root/vidpipe/data/videos/;
        types {
            video/mp4 mp4;
        }
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=2592000";
        add_header Access-Control-Allow-Origin *;
    }

    # Static assets — aggressive caching
    location ~* \.(jpg|jpeg|png|gif|webp|svg|css|js|woff2|woff|ttf|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Access log
    access_log /var/log/nginx/ilovedesi.access.log;
    error_log  /var/log/nginx/ilovedesi.error.log;
}
